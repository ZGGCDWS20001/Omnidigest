name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.franklinworksite.top
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            harbor.franklinworksite.top/public/omnidigest:${{ steps.version.outputs.VERSION }}
            harbor.franklinworksite.top/public/omnidigest:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            harbor.franklinworksite.top/public/omnidigest-frontend:${{ steps.version.outputs.VERSION }}
            harbor.franklinworksite.top/public/omnidigest-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment artifact
        run: |
          echo "Deploy version ${{ steps.version.outputs.VERSION }}" > deployment-info.txt
          echo "Backend: harbor.franklinworksite.top/public/omnidigest:${{ steps.version.outputs.VERSION }}" >> deployment-info.txt
          echo "Frontend: harbor.franklinworksite.top/public/omnidigest-frontend:${{ steps.version.outputs.VERSION }}" >> deployment-info.txt
